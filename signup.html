<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TTYL - Talk To You Later</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    /* Reset styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Body background */
    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Header with subtle glow using warm orange */
    header {
      width: 100%;
      padding: 20px;
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(8px);
    }

    header h1 {
      font-size: 2.5em;
      letter-spacing: 2px;
      color: #FFB300; /* Warm orange */
      font-weight: 700;
      /* Light underglow effect */
      text-shadow: 0 0 4px #FFB300, 0 0 8px #FFB300;
    }

    /* Hero section with gentle overlay using warm orange glow */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle, rgba(255, 177, 0, 0.05), transparent 70%);
      z-index: 0;
      animation: pulse 4s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.02); opacity: 0.9; }
      100% { transform: scale(1); opacity: 1; }
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 800px;
    }

    /* Main heading with soft orange glow */
    .hero h2 {
      font-size: 3em;
      margin-bottom: 20px;
      color: #fff;
      /* Subtle orange glow */
      text-shadow: 0 0 4px #FFB300, 0 0 8px #FFB300;
    }

    /* Subtext */
    .hero p {
      font-size: 1.5em;
      margin-bottom: 40px;
      color: #ccc;
      line-height: 1.4;
    }

    /* Buttons container */
    .btn-group {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* Buttons with subtle glow using warm orange */
    .btn {
      padding: 15px 30px;
      font-size: 1.2em;
      font-weight: 600;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 0 8px #FFB300 inset; /* Light glow */
    }

    /* SignUp button with warm orange gradient */
    .btn-signup {
      background: linear-gradient(135deg, #FFB300, #FFA000);
      color: #000;
    }
    .btn-signup:hover {
      box-shadow: 0 0 12px #FFB300 inset, 0 0 4px #FFB300;
      transform: translateY(-2px);
    }

    /* Login button with muted color */
    .btn-login {
      background-color: #ccc;
    }
    .btn-login:hover {
      box-shadow: 0 0 12px #bbb inset, 0 0 4px #bbb;
      transform: translateY(-2px);
    }

    /* Social sign-in buttons container */
    .social-buttons {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    /* Social buttons styling with soft glow in warm tones */
    .social-btn {
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 1.1em;
      cursor: pointer;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      box-shadow: 0 0 10px #FFB300, inset 0 0 8px #FFB300;
    }

    /* Google style */
    .google-btn {
      background: linear-gradient(135deg, #4285F4, #357ae8);
    }
    .google-btn:hover {
      box-shadow: 0 0 20px #4285F4, inset 0 0 8px #4285F4;
      transform: translateY(-2px);
    }

    /* Apple style - warm orange contrast */
    .apple-btn {
      background: linear-gradient(135deg, #FF7F50, #FF6347);
    }
    .apple-btn:hover {
      box-shadow: 0 0 15px #FF7F50, inset 0 0 8px #FF7F50;
      transform: translateY(-2px);
    }

    /* Back link style */
    .back-link {
      margin-top: 15px;
      font-size: 1em;
      color: #ccc;
      text-decoration: none;
      transition: color 0.3s;
    }

    .back-link:hover {
      color: #FFB300;
      text-shadow: 0 0 8px #FFB300;
    }

    /* Responsive adjustments */
    @media(max-width: 500px){
      .container {
        padding: 20px;
      }
      h2 {
        font-size: 1.8em;
      }
    }
  </style>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body>
  <header>
    <h1>TTYL - Sign Up</h1>
  </header>

  <div class="container">
    <h2>Create Your Account</h2>
    <form id="signup-form">
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Sign Up</button>
    </form>

    <!-- Social Sign-In Buttons -->
    <div class="social-buttons">
      <button class="social-btn google-btn" id="googleSignIn">Sign Up with Google</button>
      <button class="social-btn apple-btn" id="appleSignIn">Sign Up with Apple</button>
    </div>

    <a href="index.html" class="back-link">Back to Home</a>
  </div>

  <script>
    // Firebase configuration (replace with your actual config)
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Email/password sign-up
    document.getElementById('signup-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      auth.createUserWithEmailAndPassword(email, password)
        .then(() => {
          alert('Account created successfully!');
          window.location.href = 'login.html';
        })
        .catch((error) => {
          alert('Error: ' + error.message);
        });
    });

    // Google Sign-In
    document.getElementById('googleSignIn').addEventListener('click', () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider)
        .then((result) => {
          alert('Signed in with Google!');
          window.location.href = 'main.html';
        })
        .catch((error) => {
          alert('Error: ' + error.message);
        });
    });

    // Apple Sign-In - Placeholder
    document.getElementById('appleSignIn').addEventListener('click', () => {
      alert('Apple Sign-In is not implemented yet. Please use Google or email/password.');
    });
  </script>
</body>
</html>
