<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up - TTYL</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    /* Reset styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Body with subtle background */
    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Header without glow */
    header {
      width: 100%;
      padding: 20px;
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(8px);
    }

    header h1 {
      font-size: 2.5em;
      letter-spacing: 2px;
      color: #ffd700; /* Keep the color */
      font-weight: 700;
    }

    /* Container for form without glow */
    .container {
      margin: 40px auto;
      padding: 30px;
      max-width: 400px;
      width: 100%;
      background: rgba(0,0,0,0.15);
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 215, 0, 0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Title without glow */
    h2 {
      font-size: 2em;
      margin-bottom: 20px;
      color: #ffd700; /* Keep the color */
    }

    /* Form styles */
    form {
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    input {
      padding: 12px 15px;
      margin-bottom: 15px;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      outline: none;
      background-color: rgba(255,255,255,0.1);
      color: #fff;
    }

    input:focus {
      box-shadow: inset 0 0 15px #ffd700, inset 0 0 20px #ffd700;
      background-color: rgba(255,255,255,0.2);
    }

    /* Submit button without glow */
    button {
      padding: 15px;
      background: linear-gradient(135deg, #ffd700, #ffb700);
      color: #000;
      font-size: 1.2em;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: linear-gradient(135deg, #e6c200, #d6a600);
    }

    /* Social sign-in buttons container */
    .social-buttons {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    /* Social buttons styling, no glow */
    .social-btn {
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 1.1em;
      cursor: pointer;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Google style */
    .google-btn {
      background: linear-gradient(135deg, #4285F4, #357ae8);
    }

    /* Apple style */
    .apple-btn {
      background: linear-gradient(135deg, #FF7F50, #FF6347);
    }

    /* Back link styling */
    .back-link {
      margin-top: 15px;
      font-size: 1em;
      color: #ccc;
      text-decoration: none;
    }

    .back-link:hover {
      color: #ffd700;
    }

    /* Responsive styles */
    @media(max-width: 500px){
      .container {
        padding: 20px;
      }
      h2 {
        font-size: 1.8em;
      }
    }
  </style>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body>
  <header>
    <h1>TTYL - Sign Up</h1>
  </header>

  <div class="container">
    <h2>Create Your Account</h2>
    <form id="signup-form">
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Sign Up</button>
    </form>

    <!-- Social Sign-In Buttons -->
    <div class="social-buttons">
      <button class="social-btn google-btn" id="googleSignIn">Sign Up with Google</button>
      <button class="social-btn apple-btn" id="appleSignIn">Sign Up with Apple</button>
    </div>

    <a href="index.html" class="back-link">Back to Home</a>
  </div>

  <script>
    // Firebase configuration (replace with your actual config)
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Email/password sign-up
    document.getElementById('signup-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      auth.createUserWithEmailAndPassword(email, password)
        .then(() => {
          alert('Account created successfully!');
          window.location.href = 'login.html';
        })
        .catch((error) => {
          alert('Error: ' + error.message);
        });
    });

    // Google Sign-In
    document.getElementById('googleSignIn').addEventListener('click', () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider)
        .then((result) => {
          alert('Signed in with Google!');
          window.location.href = 'main.html';
        })
        .catch((error) => {
          alert('Error: ' + error.message);
        });
    });

    // Apple Sign-In - Placeholder
    document.getElementById('appleSignIn').addEventListener('click', () => {
      alert('Apple Sign-In is not implemented yet. Please use Google or email/password.');
    });
  </script>
</body>
</html>
