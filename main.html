<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Firebase Messaging System</title>
  <style>
    /* Basic styling for clarity */
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    #searchContainer, #chatContainer {
      margin-bottom: 20px;
    }
    #messages {
      border: 1px solid #ccc;
      height: 300px;
      overflow-y: scroll;
      padding: 10px;
    }
    .message {
      margin-bottom: 10px;
    }
    .myMessage {
      text-align: right;
      color: blue;
    }
  </style>
</head>
<body>

<h1>Firebase User Messaging</h1>

<div id="searchContainer">
  <input type="text" id="searchUserId" placeholder="Enter User ID to chat" />
  <button id="searchBtn">Search</button>
</div>

<div id="chatContainer" style="display: none;">
  <h3>Chat with <span id="chatWithUserId"></span></h3>
  <div id="messages"></div>
  <input type="text" id="messageInput" placeholder="Type your message" />
  <button id="sendBtn">Send</button>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
  // Your Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyANtmPajpe7laVQ_sL0kCcSwixZ0aIqvy0",
    authDomain: "ttyl-4534b.firebaseapp.com",
    projectId: "ttyl-4534b",
    storageBucket: "ttyl-4534b.firebaseapp.com",
    messagingSenderId: "311574301037",
    appId: "1:311574301037:web:b5bdc244bc8bb341e5f264",
    measurementId: "G-TYBCD4ERG4"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const database = firebase.database();

  let currentUserId = null;
  let chatPartnerId = null;
  let messagesRef = null;

  // Simulate user login for demonstration
  // Replace this with actual login flow
  auth.signInAnonymously()
    .then(() => {
      currentUserId = auth.currentUser.uid;
      console.log("Logged in as:", currentUserId);
    })
    .catch((error) => {
      console.error("Auth error:", error);
    });

  document.getElementById('searchBtn').addEventListener('click', () => {
    const userIdToChat = document.getElementById('searchUserId').value.trim();
    if (userIdToChat && userIdToChat !== currentUserId) {
      chatPartnerId = userIdToChat;
      document.getElementById('chatWithUserId').innerText = chatPartnerId;
      document.getElementById('chatContainer').style.display = 'block';
      loadMessages();
    } else {
      alert('Please enter a valid User ID different from your own.');
    }
  });

  document.getElementById('sendBtn').addEventListener('click', () => {
    sendMessage();
  });

  document.getElementById('messageInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      sendMessage();
    }
  });

  function getChatPath(userId1, userId2) {
    // Consistent ordering for chat path
    return [userId1, userId2].sort().join('_');
  }

  function loadMessages() {
    if (messagesRef) {
      messagesRef.off(); // Detach previous listener
    }
    const chatPath = getChatPath(currentUserId, chatPartnerId);
    messagesRef = database.ref('messages/' + chatPath);
    messagesRef.on('child_added', (snapshot) => {
      const message = snapshot.val();
      displayMessage(message);
    });
  }

  function displayMessage(message) {
    const messagesDiv = document.getElementById('messages');
    const msgDiv = document.createElement('div');
    msgDiv.className = 'message';
    if (message.senderId === currentUserId) {
      msgDiv.className += ' myMessage';
      msgDiv.innerText = `You: ${message.text}`;
    } else {
      msgDiv.innerText = `${chatPartnerId}: ${message.text}`;
    }
    messagesDiv.appendChild(msgDiv);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function sendMessage() {
    const messageText = document.getElementById('messageInput').value.trim();
    if (messageText && chatPartnerId) {
      const chatPath = getChatPath(currentUserId, chatPartnerId);
      const newMsgRef = database.ref('messages/' + chatPath).push();
      newMsgRef.set({
        senderId: currentUserId,
        text: messageText,
        timestamp: Date.now()
      });
      document.getElementById('messageInput').value = '';
    }
  }
</script>

</body>
</html>
