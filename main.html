<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Firebase Messaging System</title>
<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background: #f0f2f5;
  }
  header {
    background: #6200ee;
    color: white;
    padding: 1em;
    text-align: center;
  }
  .container {
    display: none;
    height: calc(100vh - 60px);
    overflow: hidden;
  }
  .view {
    display: none;
    height: 100%;
    display: flex;
    flex-direction: column;
  }
  #inboxView, #chatView {
    height: 100%;
  }
  .list {
    overflow-y: auto;
    flex: 1;
  }
  .user-item {
    display: flex;
    align-items: center;
    padding: 10px;
    cursor: pointer;
    border-bottom: 1px solid #ddd;
    background: #fff;
  }
  .user-item:hover {
    background: #f0f0f0;
  }
  .profile-pic {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    object-fit: cover;
    margin-right: 10px;
  }
  .user-info {
    flex: 1;
  }
  .name {
    font-weight: bold;
  }
  .last-message {
    font-size: 0.9em;
    color: #555;
  }
  .timestamp {
    font-size: 0.8em;
    color: #999;
  }
  #chatHeader {
    display: flex;
    align-items: center;
    padding: 0.5em;
    background: #6200ee;
    color: white;
  }
  #backBtn {
    background: none;
    border: none;
    color: white;
    font-size: 1.2em;
    margin-right: 10px;
    cursor: pointer;
  }
  #chatMessages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    background: #e5ddd5;
  }
  .message {
    max-width: 70%;
    margin: 5px 0;
    padding: 10px;
    border-radius: 10px;
    position: relative;
    display: inline-block;
    clear: both;
  }
  .sent {
    background: #dcf8c6;
    align-self: flex-end;
    margin-left: auto;
  }
  .received {
    background: #fff;
    align-self: flex-start;
    margin-right: auto;
  }
  .message-timestamp {
    font-size: 0.7em;
    color: #999;
    margin-top: 2px;
    text-align: right;
  }
  #messageInputContainer {
    display: flex;
    padding: 0.5em;
    background: #fff;
  }
  #messageInput {
    flex: 1;
    padding: 0.5em;
    border: 1px solid #ccc;
    border-radius: 20px;
    outline: none;
  }
  #sendBtn {
    background: #6200ee;
    color: white;
    border: none;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    margin-left: 10px;
    cursor: pointer;
    font-size: 1.2em;
  }
  /* Status indicators */
  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
    margin-left: 5px;
  }
  .online {
    background: green;
  }
  .offline {
    background: gray;
  }
  /* Unread badge */
  .unread-badge {
    background: red;
    color: white;
    font-size: 0.8em;
    padding: 2px 6px;
    border-radius: 12px;
    margin-left: 5px;
  }
  /* Login overlay */
  #loginOverlay {
    position: fixed;
    top:0; left:0; right:0; bottom:0;
    background: rgba(0,0,0,0.5);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index: 9999;
  }
  #loginBox {
    background:#fff;
    padding:2em;
    border-radius:8px;
    max-width:300px;
    width:100%;
  }
  #loginBox input {
    width: 100%;
    padding: 0.5em;
    margin: 0.5em 0;
  }
  #loginBox button {
    width: 100%;
    padding: 0.5em;
    background:#6200ee;
    color:#fff;
    border:none;
    border-radius:4px;
    cursor:pointer;
  }
</style>
</head>
<body>

<header>
  <h1>Firebase Messaging</h1>
</header>

<!-- Login Overlay -->
<div id="loginOverlay">
  <div id="loginBox">
    <h3>Login</h3>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button id="loginBtn">Login</button>
  </div>
</div>

<!-- Main Container -->
<div id="app">
  <!-- Inbox View -->
  <div id="inboxView" class="container view">
    <div class="list" id="inboxList"></div>
  </div>
  <!-- Chat View -->
  <div id="chatView" class="container view">
    <div id="chatHeader">
      <button id="backBtn">&#8592;</button>
      <div id="chatWith" style="flex:1;font-weight:bold;">Chat</div>
      <div id="statusIndicator" style="width:10px;height:10px;border-radius:50%;background:gray;margin-left:10px;"></div>
    </div>
    <div id="chatMessages"></div>
    <div id="messageInputContainer">
      <input type="text" id="messageInput" placeholder="Type a message..." />
      <button id="sendBtn">&#9658;</button>
    </div>
  </div>
</div>

<!-- Firebase Initialization and App Logic -->
<script>
  // Firebase config (replace with your production config)
  const firebaseConfig = {
    apiKey: "AIzaSyANtmPajpe7laVQ_sL0kCcSwixZ0aIqvy0",
    authDomain: "ttyl-4534b.firebaseapp.com",
    projectId: "ttyl-4534b",
    storageBucket: "ttyl-4534b.firebasestorage.app",
    messagingSenderId: "311574301037",
    appId: "1:311574301037:web:b5bdc244bc8bb341e5f264",
    measurementId: "G-TYBCD4ERG4",
    databaseURL: "https://ttyl-4534b-default-rtdb.europe-west1.firebasedatabase.app"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();

  // Elements
  const loginOverlay = document.getElementById('loginOverlay');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const loginBtn = document.getElementById('loginBtn');

  const inboxView = document.getElementById('inboxView');
  const chatView = document.getElementById('chatView');
  const inboxList = document.getElementById('inboxList');
  const backBtn = document.getElementById('backBtn');
  const chatWithEl = document.getElementById('chatWith');
  const chatMessages = document.getElementById('chatMessages');
  const messageInput = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');
  const statusIndicator = document.getElementById('statusIndicator');

  // State
  let currentUser = null;
  let currentUserId = null;
  let currentChatUserId = null;
  let userItems = {}; // uid -> {item, lastMsgListener, statusListener}

  // Utility: safe view switch
  function showView(view) {
    document.querySelectorAll('.container').forEach(c => c.style.display = 'none');
    if (view === 'inbox') inboxView.style.display = 'block';
    if (view === 'chat') chatView.style.display = 'block';
  }

  // Auth handling
  auth.onAuthStateChanged(user => {
    if (user) {
      currentUser = user;
      currentUserId = user.uid;
      loginOverlay.style.display = 'none';
      showView('inbox');
      ensureUserProfile();
      setupPresence();
      startInboxListeners();
    } else {
      loginOverlay.style.display = 'flex';
      showView('inbox');
    }
  });

  // Login UI
  loginBtn.addEventListener('click', () => {
    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();
    if (!email || !password) return alert('Please enter email and password');
    auth.signInWithEmailAndPassword(email, password).catch(e => alert(e.message));
  });

  // Ensure user profile exists
  function ensureUserProfile() {
    const ref = db.ref('/users/' + currentUserId);
    ref.once('value').then(snap => {
      if (!snap.exists()) {
        ref.set({
          displayName: currentUser.displayName || currentUser.email || 'User',
          photoURL: currentUser.photoURL || '',
          online: true,
          lastSeen: firebase.database.ServerValue.TIMESTAMP
        });
      } else {
        ref.update({ online: true });
      }
    });
  }

  // Presence: set online and handle onDisconnect
  function setupPresence() {
    const connectedRef = db.ref('.info/connected');
    const userRef = db.ref('/users/' + currentUserId);
    connectedRef.on('value', snap => {
      if (snap.val() === true) {
        userRef.update({ online: true });
        userRef.onDisconnect().update({ online: false, lastSeen: firebase.database.ServerValue.TIMESTAMP });
      }
    });
    window.addEventListener('unload', () => {
      userRef.update({ online: false, lastSeen: firebase.database.ServerValue.TIMESTAMP });
    });
  }

  // Inbox: listen for users
  function startInboxListeners() {
    const usersRef = db.ref('/users');
    usersRef.on('child_added', snap => {
      const uid = snap.key;
      const data = snap.val();
      if (uid === currentUserId) return;
      createOrUpdateUserItem(uid, data);
    });
    usersRef.on('child_changed', snap => {
      const uid = snap.key;
      const data = snap.val();
      if (uid === currentUserId) return;
      createOrUpdateUserItem(uid, data);
    });
    usersRef.on('child_removed', snap => removeUserItem(snap.key));
  }

  function createOrUpdateUserItem(uid, data) {
    let entry = userItems[uid];
    if (!entry) {
      const item = document.createElement('div');
      item.className = 'user-item';

      const profilePic = document.createElement('img');
      profilePic.className = 'profile-pic';
      profilePic.src = data.photoURL || 'https://via.placeholder.com/50';

      const info = document.createElement('div');
      info.className = 'user-info';

      const name = document.createElement('div');
      name.className = 'name';
      name.textContent = data.displayName || 'User';

      const lastMsg = document.createElement('div');
      lastMsg.className = 'last-message';

      const ts = document.createElement('div');
      ts.className = 'timestamp';

      const unread = document.createElement('div');
      unread.className = 'unread-badge';
      unread.style.display = 'none';

      const right = document.createElement('div');
      right.style.display = 'flex';
      right.style.flexDirection = 'column';
      right.style.alignItems = 'flex-end';
      right.appendChild(ts);
      right.appendChild(unread);

      info.appendChild(name);
      info.appendChild(lastMsg);

      const container = document.createElement('div');
      container.style.display = 'flex';
      container.style.alignItems = 'center';
      container.style.width = '100%';
      container.appendChild(profilePic);
      container.appendChild(info);
      container.appendChild(right);

      item.appendChild(container);
      item.addEventListener('click', () => openChatWith(uid));

      inboxList.appendChild(item);

      entry = { item, profilePic, name, lastMsg, ts, unread, lastMsgListener: null };
      userItems[uid] = entry;

      // Listen for inbox preview (personalized to current user)
      db.ref('/inboxes/' + currentUserId + '/' + uid).on('value', snap => {
        const d = snap.val();
        if (d) {
          entry.lastMsg.textContent = d.lastMessage || '';
          entry.ts.textContent = d.timestamp ? new Date(d.timestamp).toLocaleString() : '';
          if (d.unreadCount && d.unreadCount > 0) { entry.unread.textContent = d.unreadCount; entry.unread.style.display = 'inline-block'; }
          else { entry.unread.style.display = 'none'; }
        }
      });

      // Fallback: last message from messages if no inbox exists
      const chatId = getChatId(currentUserId, uid);
      const lastMsgRef = db.ref('/messages/' + chatId).orderByChild('timestamp').limitToLast(1);
      lastMsgRef.on('value', snap => {
        let last = null;
        snap.forEach(s => last = s.val());
        if (last && !entry.lastMsg.textContent) {
          entry.lastMsg.textContent = last.text || '';
          entry.ts.textContent = last.timestamp ? new Date(last.timestamp).toLocaleString() : '';
        }
      });

      // Online indicator: append dot to name when online
      db.ref('/users/' + uid + '/online').on('value', snap => {
        const online = snap.val();
        if (online) { entry.name.textContent = (data.displayName || 'User') + ' •'; entry.name.style.color = 'green'; }
        else { entry.name.textContent = (data.displayName || 'User'); entry.name.style.color = ''; }
      });

    } else {
      // update if exists
      entry.profilePic.src = data.photoURL || entry.profilePic.src;
      entry.name.textContent = data.displayName || entry.name.textContent;
    }
  }

  function removeUserItem(uid) {
    const e = userItems[uid];
    if (!e) return;
    e.item.remove();
    delete userItems[uid];
  }

  function getChatId(a,b){ return [a,b].sort().join('_'); }

  // Open chat and subscribe to messages
  let messagesRefActive = null;
  function openChatWith(uid) {
    currentChatUserId = uid;
    chatWithEl.textContent = userItems[uid] ? userItems[uid].name.textContent.replace(' •','') : 'Chat';
    db.ref('/users/' + uid + '/online').once('value').then(snap => statusIndicator.style.background = snap.val() ? 'green' : 'gray');
    showView('chat');
    loadChatMessages(uid);
    // Reset unread
    db.ref('/inboxes/' + currentUserId + '/' + uid).update({ unreadCount: 0 }).catch(()=>{});
  }

  function loadChatMessages(otherUid) {
    if (messagesRefActive) messagesRefActive.off();
    chatMessages.innerHTML = '';
    const chatId = getChatId(currentUserId, otherUid);
    const ref = db.ref('/messages/' + chatId).orderByChild('timestamp');
    messagesRefActive = ref;
    ref.on('child_added', snap => {
      appendMessageToChat(snap.val());
    });
  }

  function appendMessageToChat(msg) {
    const wrapper = document.createElement('div');
    wrapper.style.display = 'flex'; wrapper.style.flexDirection = 'column';
    wrapper.style.alignItems = msg.sender === currentUserId ? 'flex-end' : 'flex-start';
    wrapper.style.margin = '6px 0';

    const bubble = document.createElement('div');
    bubble.className = 'message ' + (msg.sender === currentUserId ? 'sent' : 'received');
    bubble.textContent = msg.text;

    const ts = document.createElement('div');
    ts.className = 'message-timestamp';
    ts.textContent = msg.timestamp ? new Date(msg.timestamp).toLocaleString() : '';

    wrapper.appendChild(bubble); wrapper.appendChild(ts);
    chatMessages.appendChild(wrapper);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  // Send message and update inbox previews
  sendBtn.addEventListener('click', sendMessage);
  messageInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

  function sendMessage(){
    const text = messageInput.value.trim();
    if (!text || !currentChatUserId) return;
    const chatId = getChatId(currentUserId, currentChatUserId);
    const newRef = db.ref('/messages/' + chatId).push();
    const messageData = { sender: currentUserId, receiver: currentChatUserId, text, timestamp: firebase.database.ServerValue.TIMESTAMP };
    newRef.set(messageData).then(()=> newRef.once('value')).then(snap => {
      const saved = snap.val();
      // Sender preview
      db.ref('/inboxes/' + currentUserId + '/' + currentChatUserId).set({ lastMessage: saved.text, timestamp: saved.timestamp, unreadCount: 0 });
      // Receiver preview increment
      const recvRef = db.ref('/inboxes/' + currentChatUserId + '/' + currentUserId);
      recvRef.transaction(current => {
        if (current === null) return { lastMessage: saved.text, timestamp: saved.timestamp, unreadCount: 1 };
        return { lastMessage: saved.text, timestamp: saved.timestamp, unreadCount: (current.unreadCount || 0) + 1 };
      });
      messageInput.value = '';
    }).catch(e => console.error(e));
  }

  // Back button
  backBtn.addEventListener('click', () => {
    if (messagesRefActive) messagesRefActive.off();
    currentChatUserId = null; showView('inbox');
  });

  // Cleanup presence on unload
  window.addEventListener('beforeunload', () => {
    if (currentUserId) db.ref('/users/' + currentUserId).update({ online: false, lastSeen: firebase.database.ServerValue.TIMESTAMP });
  });

  // Recommended Realtime Database rules (example):
  /*
  {
    "rules": {
      "users": {
        "$uid": {
          ".read": "auth != null",
          ".write": "auth != null && auth.uid === $uid"
        }
      },
      "messages": {
        "$chatId": {
          "$messageId": {
            ".read": "auth != null",
            ".write": "auth != null && newData.child('sender').val() === auth.uid"
          }
        }
      },
      "inboxes": {
        "$uid": {
          ".read": "auth != null && auth.uid === $uid",
          ".write": "auth != null && auth.uid === $uid"
        }
      }
    }
  }
  */

</script>

</body>
</html>
