<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In - TTYL</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    /* Reset styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Body with animated gradient background */
    body {
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(270deg, #1e3c72, #2a5298, #1e3c72);
      background-size: 600% 600%;
      animation: gradientBG 15s ease infinite;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Container for login */
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Website name at the top */
    .site-name {
      font-family: 'Montserrat', sans-serif;
      font-size: 2em;
      font-weight: 700;
      color: #00ffff;
      margin-bottom: 10px;
      letter-spacing: 2px;
      animation: pulseColor 2s infinite alternate;
    }

    @keyframes pulseColor {
      0% { color: #00ffff; }
      100% { color: #66ffff; }
    }

    /* Container box style */
    .container-box {
      background: rgba(255, 255, 255, 0.05);
      padding: 40px;
      border-radius: 15px;
      margin-top: 10px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Header styles */
    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      color: #00ffff;
      letter-spacing: 2px;
      text-align: center;
    }

    /* Subheading styles */
    h2 {
      font-size: 1.5em;
      margin-bottom: 20px;
      color: #66ffff;
      text-align: center;
    }

    /* Form styling */
    form {
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    input {
      padding: 14px 16px;
      margin-bottom: 15px;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      outline: none;
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    input:focus {
      background: rgba(255,255,255,0.2);
      box-shadow: 0 0 12px #00ffff inset;
    }

    /* Login button styles */
    button {
      padding: 15px;
      background: linear-gradient(135deg, #00ffff, #009999);
      border: none;
      border-radius: 8px;
      font-size: 1.2em;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      transition: box-shadow 0.3s, transform 0.3s, background 0.3s;
      box-shadow: 0 0 10px #00ffff;
    }

    button:hover {
      background: linear-gradient(135deg, #00cccc, #006666);
      box-shadow: 0 0 20px #00ffff;
      transform: translateY(-2px);
    }

    /* Links below the form */
    .links {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    a {
      color: #66ffff;
      text-decoration: none;
      font-size: 1em;
      transition: color 0.3s, text-shadow 0.3s;
    }

    a:hover {
      color: #ffffff;
      text-shadow: 0 0 8px #00ffff;
    }

    /* Responsive adjustments */
    @media(max-width: 500px){
      .container-box {
        padding: 20px;
      }
      h1 {
        font-size: 2em;
      }
      h2 {
        font-size: 1.3em;
      }
    }
  </style>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body>
  <div class="container">
    <div class="site-name">TTYL</div>
    <div class="container-box">
      <h1>Welcome Back</h1>
      <h2>Log in to your account</h2>
      <form id="login-form">
        <input type="email" id="email" placeholder="Email" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit">Log In</button>
      </form>
      <div class="links">
        <a href="signup.html">Create an account</a>
      </div>
    </div>
  </div>

  <script>
    // Firebase config (replace with your actual config)
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // When login is successful, redirect to main.html
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      auth.signInWithEmailAndPassword(email, password)
        .then(() => {
          window.location.href = 'main.html'; // Redirect to main.html
        })
        .catch((error) => {
          alert('Error: ' + error.message);
        });
    });
  </script>
</body>
</html>
