<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In - TTYL</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    /* Reset styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Body with animated gradient background */
    body {
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(270deg, #1e3c72, #2a5298, #1e3c72);
      background-size: 600% 600%;
      animation: gradientBG 15s ease infinite;
      color: #fff;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Container card with semi-transparent background and subtle shadow */
    .container {
      background: rgba(255, 255, 255, 0.05);
      padding: 40px;
      border-radius: 15px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    /* Add slight hover effect to container */
    .container:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.4);
    }

    /* Header with modern font and color */
    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      color: #00ffff; /* cyan */
      letter-spacing: 2px;
      text-align: center;
    }

    /* Subheading or welcome message */
    h2 {
      font-size: 1.5em;
      margin-bottom: 20px;
      color: #66ffff; /* light cyan */
      text-align: center;
    }

    /* Form styles */
    form {
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    input {
      padding: 14px 16px;
      margin-bottom: 15px;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      outline: none;
      background: rgba(255,255,255,0.1);
      color: #fff;
      transition: background 0.3s, box-shadow 0.3s;
    }

    input:focus {
      background: rgba(255,255,255,0.2);
      box-shadow: 0 0 12px #00ffff inset;
    }

    /* Submit button with glow effect on hover */
    button {
      padding: 15px;
      background: linear-gradient(135deg, #00ffff, #009999);
      border: none;
      border-radius: 8px;
      font-size: 1.2em;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      transition: box-shadow 0.3s, transform 0.3s, background 0.3s;
      box-shadow: 0 0 10px #00ffff;
    }

    button:hover {
      background: linear-gradient(135deg, #00cccc, #006666);
      box-shadow: 0 0 20px #00ffff;
      transform: translateY(-2px);
    }

    /* Links below the form */
    .links {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    a {
      color: #66ffff;
      text-decoration: none;
      font-size: 1em;
      transition: color 0.3s, text-shadow 0.3s;
    }

    a:hover {
      color: #ffffff;
      text-shadow: 0 0 8px #00ffff;
    }

    /* Social login buttons */
    .social-buttons {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .social-btn {
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 1.1em;
      cursor: pointer;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: box-shadow 0.3s, transform 0.3s, background 0.3s;
      box-shadow: 0 0 10px #00ffff;
    }

    /* Google style */
    .google-btn {
      background: linear-gradient(135deg, #4285F4, #357ae8);
    }
    .google-btn:hover {
      background: linear-gradient(135deg, #3060c0, #214080);
      box-shadow: 0 0 20px #00ffff;
      transform: translateY(-2px);
    }

    /* Apple style */
    .apple-btn {
      background: linear-gradient(135deg, #FF7F50, #FF6347);
    }
    .apple-btn:hover {
      background: linear-gradient(135deg, #FF6347, #FF4500);
      box-shadow: 0 0 20px #FF7F50;
      transform: translateY(-2px);
    }

    /* Responsive adjustments */
    @media(max-width: 500px){
      .container {
        padding: 20px;
      }
      h1 {
        font-size: 2em;
      }
      h2 {
        font-size: 1.3em;
      }
    }
  </style>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body>
  <div class="container">
    <h1>Welcome Back</h1>
    <h2>Log in to your account</h2>
    <form id="login-form">
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Log In</button>
    </form>
    <div class="social-buttons">
      <button class="social-btn google-btn" id="googleSignIn">Sign In with Google</button>
      <button class="social-btn apple-btn" id="appleSignIn">Sign In with Apple</button>
    </div>
    <div class="links">
      <a href="signup.html">Create an account</a>
    </div>
  </div>

  <script>
    // Your Firebase configuration (replace with your actual config)
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };
    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Handle email/password login
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      auth.signInWithEmailAndPassword(email, password)
        .then(() => {
          alert('Logged in successfully!');
          window.location.href = 'main.html'; // or dashboard
        })
        .catch((error) => {
          alert('Error: ' + error.message);
        });
    });

    // Google sign-in
    document.getElementById('googleSignIn').addEventListener('click', () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider)
        .then((result) => {
          alert('Signed in with Google!');
          window.location.href = 'main.html';
        })
        .catch((error) => {
          alert('Error: ' + error.message);
        });
    });

    // Apple sign-in placeholder
    document.getElementById('appleSignIn').addEventListener('click', () => {
      alert('Apple Sign-In is not implemented yet.');
    });
  </script>
</body>
</html>
